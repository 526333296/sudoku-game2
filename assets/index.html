<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小朋友数独</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        #game-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        
        #header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        #header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        #level-info {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
        }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
            margin: 20px auto;
            width: fit-content;
            background: #333;
            padding: 3px;
            border-radius: 10px;
        }
        
        .cell {
            width: 70px;
            height: 70px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            border-radius: 5px;
        }
        
        .cell:hover {
            background: #f0f0f0;
        }
        
        .cell:active {
            transform: scale(0.95);
        }
        
        .cell.given {
            background: #e0e0e0;
            cursor: default;
            font-weight: bold;
        }
        
        .cell.selected {
            background: #b3d9ff;
        }
        
        .cell.error {
            background: #ffcccc;
            animation: shake 0.5s;
        }
        
        .cell.correct {
            background: #ccffcc;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        #symbol-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .symbol-btn {
            width: 60px;
            height: 60px;
            font-size: 28px;
            border: 3px solid #667eea;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 auto;
        }
        
        .symbol-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .symbol-btn:active {
            transform: scale(0.9);
        }
        
        #controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        
        #check-btn {
            background: #4CAF50;
            color: white;
        }
        
        #hint-btn {
            background: #2196F3;
            color: white;
        }
        
        #reset-btn {
            background: #ff9800;
            color: white;
        }
        
        #new-game-btn {
            background: #9C27B0;
            color: white;
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        #message {
            text-align: center;
            font-size: 20px;
            margin-top: 15px;
            min-height: 30px;
            font-weight: bold;
        }
        
        .success {
            color: #4CAF50;
        }
        
        .error-msg {
            color: #f44336;
        }
        
        #win-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        #win-modal.show {
            display: flex;
        }
        
        #win-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        #win-content h2 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        #win-content p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #666;
        }
        
        #next-level-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        @media (max-width: 400px) {
            .cell {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
            
            .symbol-btn {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <h1>🎮 小朋友数独</h1>
            <div id="level-info">第 1 关 / 共 50 关</div>
        </div>
        
        <div id="game-board"></div>
        
        <div id="symbol-panel"></div>
        
        <div id="controls">
            <button class="control-btn" id="check-btn">✓ 检查</button>
            <button class="control-btn" id="hint-btn">💡 提示</button>
            <button class="control-btn" id="reset-btn">↺ 重置</button>
            <button class="control-btn" id="new-game-btn">🔄 新游戏</button>
        </div>
        
        <div id="message"></div>
    </div>
    
    <div id="win-modal">
        <div id="win-content">
            <h2>🎉 太棒了！</h2>
            <p id="win-message">你完成了第 1 关！</p>
            <button id="next-level-btn">下一关 ➜</button>
        </div>
    </div>

    <script>
        const SYMBOLS = ['🐶', '🐱', '🐭', '🐰'];
        let currentLevel = 1;
        let board = [];
        let solution = [];
        let selectedCell = null;
        let givenCells = new Set();
        
        // 生成完整数独解
        function generateSolution() {
            const grid = Array(4).fill(null).map(() => Array(4).fill(0));
            
            function isValid(grid, row, col, num) {
                for (let i = 0; i < 4; i++) {
                    if (grid[row][i] === num) return false;
                    if (grid[i][col] === num) return false;
                }
                
                const boxRow = Math.floor(row / 2) * 2;
                const boxCol = Math.floor(col / 2) * 2;
                for (let i = boxRow; i < boxRow + 2; i++) {
                    for (let j = boxCol; j < boxCol + 2; j++) {
                        if (grid[i][j] === num) return false;
                    }
                }
                
                return true;
            }
            
            function solve(grid) {
                for (let row = 0; row < 4; row++) {
                    for (let col = 0; col < 4; col++) {
                        if (grid[row][col] === 0) {
                            const numbers = [1, 2, 3, 4].sort(() => Math.random() - 0.5);
                            for (let num of numbers) {
                                if (isValid(grid, row, col, num)) {
                                    grid[row][col] = num;
                                    if (solve(grid)) return true;
                                    grid[row][col] = 0;
                                }
                            }
                            return false;
                        }
                    }
                }
                return true;
            }
            
            solve(grid);
            return grid;
        }
        
        // 根据关卡生成谜题
        function generatePuzzle(level) {
            solution = generateSolution();
            board = solution.map(row => [...row]);
            
            // 根据关卡决定挖空数量（1-50关：从6个逐渐减少到3个）
            const givenCount = Math.max(3, 7 - Math.floor(level / 10));
            const totalCells = 16;
            const emptyCount = totalCells - givenCount;
            
            let positions = [];
            for (let i = 0; i < 16; i++) {
                positions.push(i);
            }
            positions.sort(() => Math.random() - 0.5);
            
            givenCells.clear();
            for (let i = 0; i < emptyCount; i++) {
                const pos = positions[i];
                const row = Math.floor(pos / 4);
                const col = pos % 4;
                board[row][col] = 0;
            }
            
            // 记录预设格子
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] !== 0) {
                        givenCells.add(`${i}-${j}`);
                    }
                }
            }
        }
        
        // 渲染游戏板
        function renderBoard() {
            const boardElement = document.getElementById('game-board');
            boardElement.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    if (board[i][j] !== 0) {
                        cell.textContent = SYMBOLS[board[i][j] - 1];
                    }
                    
                    if (givenCells.has(`${i}-${j}`)) {
                        cell.classList.add('given');
                    } else {
                        cell.addEventListener('click', () => selectCell(i, j));
                    }
                    
                    boardElement.appendChild(cell);
                }
            }
        }
        
        // 渲染符号选择面板
        function renderSymbolPanel() {
            const panel = document.getElementById('symbol-panel');
            panel.innerHTML = '';
            
            SYMBOLS.forEach((symbol, index) => {
                const btn = document.createElement('button');
                btn.className = 'symbol-btn';
                btn.textContent = symbol;
                btn.addEventListener('click', () => placeSymbol(index + 1));
                panel.appendChild(btn);
            });
        }
        
        // 选择格子
        function selectCell(row, col) {
            if (givenCells.has(`${row}-${col}`)) return;
            
            selectedCell = { row, col };
            
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('selected');
            });
            
            const cellElement = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            cellElement.classList.add('selected');
        }
        
        // 放置符号
        function placeSymbol(num) {
            if (!selectedCell) {
                showMessage('请先选择一个格子！', 'error-msg');
                return;
            }
            
            const { row, col } = selectedCell;
            
            if (givenCells.has(`${row}-${col}`)) {
                showMessage('这个格子不能改哦！', 'error-msg');
                return;
            }
            
            board[row][col] = num;
            const cellElement = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            cellElement.textContent = SYMBOLS[num - 1];
            cellElement.classList.remove('error');
            
            // 检查是否正确
            if (num === solution[row][col]) {
                cellElement.classList.add('correct');
                setTimeout(() => cellElement.classList.remove('correct'), 500);
            }
        }
        
        // 检查答案
        function checkSolution() {
            let isComplete = true;
            let isCorrect = true;
            
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) {
                        isComplete = false;
                        const cellElement = document.querySelector(`[data-row="${i}"][data-col="${j}"]`);
                        cellElement.classList.add('error');
                    } else if (board[i][j] !== solution[i][j]) {
                        isCorrect = false;
                        const cellElement = document.querySelector(`[data-row="${i}"][data-col="${j}"]`);
                        cellElement.classList.add('error');
                    }
                }
            }
            
            if (!isComplete) {
                showMessage('还有空格子没填完哦！', 'error-msg');
                return;
            }
            
            if (isCorrect) {
                showWin();
            } else {
                showMessage('有些地方不对，再试试！', 'error-msg');
            }
        }
        
        // 提示功能
        function giveHint() {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0 || board[i][j] !== solution[i][j]) {
                        emptyCells.push({ row: i, col: j });
                    }
                }
            }
            
            if (emptyCells.length === 0) {
                showMessage('已经全部正确了！', 'success');
                return;
            }
            
            const hint = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            const { row, col } = hint;
            
            board[row][col] = solution[row][col];
            const cellElement = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            cellElement.textContent = SYMBOLS[solution[row][col] - 1];
            cellElement.classList.remove('error');
            givenCells.add(`${row}-${col}`);
            cellElement.classList.add('given');
            cellElement.style.background = '#ffffcc';
            
            showMessage('✨ 提示已填入！', 'success');
        }
        
        // 重置当前关卡
        function resetGame() {
            generatePuzzle(currentLevel);
            renderBoard();
            selectedCell = null;
            showMessage('游戏已重置！', 'success');
        }
        
        // 显示胜利
        function showWin() {
            const modal = document.getElementById('win-modal');
            const message = document.getElementById('win-message');
            message.textContent = `你完成了第 ${currentLevel} 关！`;
            modal.classList.add('show');
        }
        
        // 下一关
        function nextLevel() {
            if (currentLevel >= 50) {
                showMessage('🎉 恭喜你！全部通关了！', 'success');
                document.getElementById('win-modal').classList.remove('show');
                return;
            }
            
            currentLevel++;
            startLevel(currentLevel);
            document.getElementById('win-modal').classList.remove('show');
        }
        
        // 开始指定关卡
        function startLevel(level) {
            currentLevel = level;
            document.getElementById('level-info').textContent = `第 ${currentLevel} 关 / 共 50 关`;
            generatePuzzle(currentLevel);
            renderBoard();
            selectedCell = null;
            document.getElementById('message').textContent = '';
        }
        
        // 显示消息
        function showMessage(text, className) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = className;
            setTimeout(() => {
                message.textContent = '';
                message.className = '';
            }, 3000);
        }
        
        // 事件监听
        document.getElementById('check-btn').addEventListener('click', checkSolution);
        document.getElementById('hint-btn').addEventListener('click', giveHint);
        document.getElementById('reset-btn').addEventListener('click', resetGame);
        document.getElementById('new-game-btn').addEventListener('click', () => startLevel(currentLevel));
        document.getElementById('next-level-btn').addEventListener('click', nextLevel);
        
        // 初始化游戏
        renderSymbolPanel();
        startLevel(1);
    </script>
</body>
</html>
